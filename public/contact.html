<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — RankSniper</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810; --surface: #0d1117; --surface2: #161b27;
    --border: rgba(255,255,255,0.07); --accent: #3b82f6; --accent2: #6366f1;
    --green: #22c55e; --text: #f0f4ff; --muted: #6b7280; --subtle: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; min-height: 100vh; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; cursor: pointer; }
  .nav-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .user-email { font-size: 13px; color: var(--subtle); }
  .nav-link { padding: 7px 16px; border: 1px solid var(--border); border-radius: 7px; color: var(--subtle); font-size: 13px; text-decoration: none; transition: all 0.2s; }
  .nav-link:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .logout-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 7px; color: var(--subtle); background: none; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .logout-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .main { max-width: 900px; margin: 0 auto; padding: 60px 32px; }
  .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 14px; }
  .section-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 38px; font-weight: 800; line-height: 1.1; margin-bottom: 14px; letter-spacing: -0.5px; }

  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-top: 50px; }
  .contact-info h3 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 14px; }
  .contact-info p { font-size: 15px; color: var(--subtle); line-height: 1.7; margin-bottom: 24px; }
  .contact-detail { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 14px; color: var(--subtle); }
  .contact-detail span { width: 36px; height: 36px; background: rgba(59,130,246,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

  .contact-form { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; position: relative; overflow: hidden; }
  .contact-form::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--subtle); margin-bottom: 7px; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 11px 13px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  textarea.form-input { resize: vertical; min-height: 120px; }
  .contact-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 6px; transition: opacity 0.2s; }
  .contact-btn:hover { opacity: 0.9; }
  .contact-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 10px; display: none; }
  .msg.success { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .msg.error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }

  @media (max-width: 768px) {
    .main { padding: 40px 16px; }
    .contact-grid { grid-template-columns: 1fr; gap: 36px; }
    nav { padding: 14px 20px; }
    .user-email { display: none; }
    .section-title { font-size: 28px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="window.location.href='/dashboard.html'">
    <div class="nav-logo-icon">RS</div>
    RankSniper
  </div>
  <div class="nav-right">
    <span class="user-email" id="user-email"></span>
    <a href="/history.html" class="nav-link">History</a>
    <a href="/dashboard.html" class="nav-link">Dashboard</a>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<div class="main">
  <div class="section-label">Contact Us</div>
  <h2 class="section-title">We're here to help.</h2>

  <div class="contact-grid">
    <div class="contact-info">
      <h3>Get in touch</h3>
      <p>Have a question about RankSniper? Want to report a bug or request a feature? We respond to every message within 24 hours.</p>
      <div class="contact-detail" id="contact-email-row"></div>
      <div class="contact-detail"><span>💬</span> Average response time: under 24 hours</div>
      <div class="contact-detail"><span>🕐</span> Support hours: Mon–Fri, 9am–6pm PST</div>
    </div>

    <div class="contact-form">
      <form id="form-contact">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" class="form-input" id="contact-name" placeholder="John Smith" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="contact-email" placeholder="you@business.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea class="form-input" id="contact-message" placeholder="Tell us how we can help..." required></textarea>
        </div>
        <button type="submit" class="contact-btn" id="contact-btn">Send Message</button>
        <div class="msg" id="contact-msg"></div>
      </form>
    </div>
  </div>
</div>

<script>
const API = '';

document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('contact-email-row');
  if (el) el.innerHTML = '<span>📧</span>' + 'contactranksniper' + '@' + 'gmail.com';
});

async function init() {
  const token = localStorage.getItem('rs_token');
  if (!token) return;
  try {
    const res = await fetch(API + '/api/user/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.ok) {
      const user = await res.json();
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('contact-email').value = user.email;
    }
  } catch (err) {}
}

document.getElementById('form-contact').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('contact-btn');
  const msg = document.getElementById('contact-msg');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const res = await fetch(API + '/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('contact-name').value,
        email: document.getElementById('contact-email').value,
        message: document.getElementById('contact-message').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Message sent! We will get back to you within 24 hours.';
      msg.className = 'msg success'; msg.style.display = 'block';
      document.getElementById('form-contact').reset();
      document.getElementById('contact-email').value = document.getElementById('user-email').textContent;
    } else {
      msg.textContent = data.error || 'Failed to send';
      msg.className = 'msg error'; msg.style.display = 'block';
    }
  } catch (err) {
    msg.textContent = 'Network error. Please try again.';
    msg.className = 'msg error'; msg.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Send Message';
  }
});

function logout() { localStorage.removeItem('rs_token'); window.location.href = '/'; }

init();
</script>
</body>
</html>
